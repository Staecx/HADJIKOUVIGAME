<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hadjikouvi Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;user-select:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateY(16px);overflow-y:auto;overflow-x:hidden}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.o1{width:350px;height:350px;background:rgba(0,122,255,.12);top:-80px;right:-80px;filter:blur(70px)}
.o2{width:250px;height:250px;background:rgba(88,86,214,.10);bottom:-50px;left:-60px;filter:blur(60px)}
.o3{width:180px;height:180px;background:rgba(255,45,85,.07);top:45%;left:25%;filter:blur(55px)}
/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);z-index:50}
.spill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:50px;padding:5px 12px;transition:border-color .3s}
.savp{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.savimg{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0}
.sname{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spts{font-size:15px;font-weight:800;color:#FFD60A}
.mbadge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.5)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:50px;border:none;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,#007AFF,#5856D6);color:#fff;box-shadow:0 8px 28px rgba(0,122,255,.3)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 12px 36px rgba(0,122,255,.45)}
.btn-s{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn-s:hover{background:rgba(255,255,255,.14)}
.btn-g{background:linear-gradient(135deg,#34C759,#30D158);color:#fff;box-shadow:0 6px 20px rgba(52,199,89,.25)}
.btn-gold{background:linear-gradient(135deg,#FFD60A,#FF9F0A);color:#000}
.btn-r{background:linear-gradient(135deg,#FF3B30,#FF2D55);color:#fff}
.btn-sm{padding:10px 18px;font-size:13px}
.btn-xs{padding:8px 14px;font-size:12px;border-radius:50px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);font-family:inherit;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-xs:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.btn-xs:disabled{opacity:.2;cursor:not-allowed}
.w100{width:100%}
/* INPUT */
.inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:13px 16px;color:#fff;font-family:inherit;font-size:15px;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(0,122,255,.6)}
.inp::placeholder{color:rgba(255,255,255,.25)}
.txtarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;color:#fff;font-family:inherit;font-size:13px;resize:none;outline:none;height:76px;line-height:1.5}
.txtarea:focus{border-color:rgba(255,255,255,.3)}
/* CARDS */
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px}
.ghpill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:50px;padding:8px 16px;align-self:flex-start}
.ghpill h2{font-size:14px;font-weight:800}
.gtag{margin-left:4px;font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 9px;border-radius:50px}
.tvs{background:rgba(255,45,85,.15);color:#FF2D55}
.tcoop{background:rgba(52,199,89,.15);color:#34C759}
/* TIMER */
.timerrow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:10px 14px}
.tsvg{transform:rotate(-90deg);flex-shrink:0}
.tcbg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:5}
.tcarc{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s}
.ttime{font-size:22px;font-weight:800;line-height:1;transition:color .3s}
.tlbl{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:1px}
/* BUZZ */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bcard{border-radius:18px;border:2px solid;padding:20px 12px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.bcard:active{transform:scale(.95)}
.bc1{background:rgba(0,122,255,.08);border-color:rgba(0,122,255,.3)}
.bc1:hover{background:rgba(0,122,255,.16)}
.bc2{background:rgba(255,45,85,.08);border-color:rgba(255,45,85,.3)}
.bc2:hover{background:rgba(255,45,85,.16)}
.bcard.win{animation:bw .4s cubic-bezier(.34,1.56,.64,1)}
.bcard.off{pointer-events:none;opacity:.4}
@keyframes bw{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
.bavp{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800}
.bavimg{width:52px;height:52px;border-radius:50%;object-fit:cover}
.bname{font-weight:700;font-size:13px}
.blbl{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3)}
/* REVEAL */
.revbox{background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.25);border-radius:14px;padding:13px;text-align:center;display:none}
.revbox.show{display:block;animation:fi .3s ease}
.revanswer{font-size:18px;font-weight:800;color:#34C759;margin-bottom:2px}
.revsub{font-size:11px;color:rgba(255,255,255,.35)}
/* OPTIONS */
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{padding:13px 12px;border-radius:13px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.10);color:#fff;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px;line-height:1.4}
.opt:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.2)}
.opt:active{transform:scale(.97)}
.opt.correct{background:rgba(52,199,89,.12);border-color:#34C759;color:#34C759;pointer-events:none}
.opt.wrong{background:rgba(255,59,48,.10);border-color:#FF3B30;color:#FF3B30;pointer-events:none}
.opt.disabled{pointer-events:none;opacity:.35}
.optl{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
/* PTROW */
.ptrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
/* FEEDBACK */
.fbbox{border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.6;display:none}
.fbbox.show{display:block;animation:fi .3s ease}
.fbok{background:rgba(52,199,89,.10);border:1px solid rgba(52,199,89,.25);color:rgba(255,255,255,.8)}
.fbko{background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.2);color:rgba(255,255,255,.75)}
.fbto{background:rgba(255,159,10,.08);border:1px solid rgba(255,159,10,.2);color:rgba(255,255,255,.75)}
/* NEXT */
.nxtbtn{width:100%;padding:13px;border-radius:50px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;display:none}
.nxtbtn:hover{background:rgba(255,255,255,.14);color:#fff}
.nxtbtn.show{display:block}
.endbtn{width:100%;padding:12px;border-radius:50px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.3);font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.endbtn:hover{color:rgba(255,255,255,.6)}
/* BITLIFE */
.blscene{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px}
.bllbl{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.35);margin-bottom:7px;text-transform:uppercase}
.bltxt{font-size:14px;font-weight:500;line-height:1.75;color:rgba(255,255,255,.85)}
.bltxt strong{color:#fff;font-weight:700}
.blchoices{display:flex;flex-direction:column;gap:7px}
.blch{padding:13px 14px;border-radius:13px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.10);color:#fff;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:11px}
.blch:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.2);transform:translateX(4px)}
.blch:active{transform:scale(.98)}
.blch.cg{background:rgba(52,199,89,.12);border-color:#34C759;pointer-events:none}
.blch.cb{background:rgba(255,59,48,.10);border-color:#FF3B30;pointer-events:none}
.blch.cdis{pointer-events:none;opacity:.35}
.blcl{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
.blout{background:rgba(0,122,255,.08);border:1px solid rgba(0,122,255,.2);border-radius:13px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,.75);line-height:1.6;display:none}
.blout.show{display:block;animation:fi .3s ease}
.hpbar{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.hpfill{height:100%;border-radius:4px;transition:width .8s,background .5s}
/* QBOX */
.qbox{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:18px;text-align:center}
.qbadge{display:inline-block;padding:4px 11px;border-radius:50px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.qtxt{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:5px}
.qhint{font-size:12px;color:rgba(255,255,255,.35)}
.lyric{font-size:15px;font-weight:700;line-height:2.2;text-align:center}
.lbl{display:inline-block;background:rgba(0,122,255,.15);border-bottom:2px solid #007AFF;min-width:80px;padding:0 8px;color:#007AFF;border-radius:4px}
/* VOD */
.vodcard{border-radius:18px;padding:24px 18px;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.vver{background:rgba(0,122,255,.08);border:1.5px solid rgba(0,122,255,.25)}
.vdef{background:rgba(255,45,85,.08);border:1.5px solid rgba(255,45,85,.25)}
.vodtype{font-size:10px;font-weight:700;letter-spacing:3px}
.vver .vodtype{color:#007AFF}
.vdef .vodtype{color:#FF2D55}
.vodtxt{font-size:17px;font-weight:700;line-height:1.5}
/* DLM */
.dlmw{font-size:42px;font-weight:800;text-align:center;padding:22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:18px;color:#34C759;transition:filter .3s}
.dlmblur{filter:blur(14px);color:rgba(52,199,89,.3);user-select:none}
/* BAC */
.bacletter{font-size:56px;font-weight:800;text-align:center;color:#FFD60A;line-height:1;font-family:'Syne',sans-serif}
.bacfields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.bacfw label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.35);display:block;margin-bottom:3px}
.bacfw input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 12px;color:#fff;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.bacfw input:focus{border-color:rgba(255,214,10,.5)}
/* OSC/TMK */
.osc2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.oscbox{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:14px;padding:11px}
.osclbl{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.35);margin-bottom:7px}
/* HOME */
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.cdot:hover{transform:scale(1.2)}
.cdot.sel{border-color:#fff;transform:scale(1.15)}
/* ANIMATIONS */
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes cdpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes trophyB{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
@keyframes bw{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
.fade-in{animation:fi .3s ease}
.slide-up{animation:su .4s cubic-bezier(.4,0,.2,1)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<!-- HOME -->
<div class="screen active" id="s-home" style="padding:40px 20px;justify-content:flex-start;padding-top:50px">
  <div style="text-align:center;margin-bottom:24px;position:relative;z-index:1">
    <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,8vw,42px);background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.55));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.05">HADJIKOUVI<br>GAME</h1>
    <div style="font-size:11px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-top:7px;font-weight:500">La soirée qui change tout</div>
  </div>
  <div style="display:flex;gap:12px;width:100%;max-width:500px;margin-bottom:14px;position:relative;z-index:1">
    <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.35);align-self:flex-start">JOUEUR 1</div>
      <label style="width:64px;height:64px;border-radius:50%;border:2px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:rgba(255,255,255,.04)">
        <img id="av1img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%">
        <span id="av1ico" style="font-size:22px;color:rgba(255,255,255,.25)">📷</span>
        <input type="file" accept="image/*" onchange="loadAv(1,this)" style="position:absolute;width:1px;height:1px;opacity:0">
      </label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center" id="cd1">
        <div class="cdot sel" style="background:#007AFF" onclick="selC(1,'#007AFF',this)"></div>
        <div class="cdot" style="background:#5856D6" onclick="selC(1,'#5856D6',this)"></div>
        <div class="cdot" style="background:#34C759" onclick="selC(1,'#34C759',this)"></div>
        <div class="cdot" style="background:#FF9F0A" onclick="selC(1,'#FF9F0A',this)"></div>
        <div class="cdot" style="background:#FF2D55" onclick="selC(1,'#FF2D55',this)"></div>
      </div>
      <input class="inp" id="n1" placeholder="Ton prénom" maxlength="12">
    </div>
    <div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.35);align-self:flex-start">JOUEUR 2</div>
      <label style="width:64px;height:64px;border-radius:50%;border:2px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:rgba(255,255,255,.04)">
        <img id="av2img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%">
        <span id="av2ico" style="font-size:22px;color:rgba(255,255,255,.25)">📷</span>
        <input type="file" accept="image/*" onchange="loadAv(2,this)" style="position:absolute;width:1px;height:1px;opacity:0">
      </label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center" id="cd2">
        <div class="cdot" style="background:#007AFF" onclick="selC(2,'#007AFF',this)"></div>
        <div class="cdot sel" style="background:#FF2D55" onclick="selC(2,'#FF2D55',this)"></div>
        <div class="cdot" style="background:#FF9F0A" onclick="selC(2,'#FF9F0A',this)"></div>
        <div class="cdot" style="background:#5AC8FA" onclick="selC(2,'#5AC8FA',this)"></div>
        <div class="cdot" style="background:#30D158" onclick="selC(2,'#30D158',this)"></div>
      </div>
      <input class="inp" id="n2" placeholder="Son prénom" maxlength="12">
    </div>
  </div>
  <div style="width:100%;max-width:500px;position:relative;z-index:1">
    <button class="btn btn-p w100" onclick="startGame()" style="font-size:16px;padding:17px">Lancer la soirée 🚀</button>
  </div>
</div>

<!-- COUNTDOWN -->
<div class="screen" id="s-cd" style="background:#000;z-index:100">
  <div id="cdnum" style="font-family:'Syne',sans-serif;font-weight:800;font-size:22vw;line-height:1;background:linear-gradient(135deg,#007AFF,#5856D6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">3</div>
  <div id="cdgn" style="font-size:16px;color:rgba(255,255,255,.4);margin-top:12px;font-weight:600"></div>
</div>

<!-- WHEEL -->
<div class="screen" id="s-wheel" style="background:#000;padding:20px;gap:14px">
  <div class="topbar">
    <div class="spill" id="w-tb1"></div>
    <div class="mbadge" id="w-tbm">MANCHE 1</div>
    <div class="spill" id="w-tb2"></div>
  </div>
  <div style="height:56px"></div>
  <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;position:relative;z-index:1">Tourne la roue !</div>
  <div style="font-size:12px;color:rgba(255,255,255,.35);position:relative;z-index:1">Pour découvrir le prochain jeu</div>
  <div style="position:relative;width:280px;height:280px;flex-shrink:0;z-index:1">
    <div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:24px solid #FFD60A;z-index:10;filter:drop-shadow(0 0 8px rgba(255,214,10,.8))"></div>
    <canvas id="wc" width="280" height="280"></canvas>
  </div>
  <div id="wres" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;text-align:center;min-height:26px;color:#FFD60A;position:relative;z-index:1"></div>
  <div id="wgprev" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:12px 16px;width:100%;max-width:380px;display:none;align-items:center;gap:10px;position:relative;z-index:1">
    <div id="wgpemoji" style="font-size:26px"></div>
    <div><div id="wgpname" style="font-size:14px;font-weight:700"></div><div id="wgptag" style="font-size:10px;font-weight:700;letter-spacing:2px;margin-top:2px"></div></div>
  </div>
  <button class="btn btn-p" id="wspin" onclick="spinWheel()" style="position:relative;z-index:1">Tourner 🎡</button>
  <button class="btn btn-s" id="wnxt" style="display:none;position:relative;z-index:1" onclick="launchGame()">Jouer →</button>
</div>

<!-- GAME -->

<script>
'use strict';
// ══════════════════════════
// AUDIO
// ══════════════════════════
var AC;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
function beep(f,d,t,g,dl) {
  if (!AC) return;
  t = t||'sine'; g = g||0.3; dl = dl||0;
  setTimeout(function() {
    try {
      var o = AC.createOscillator(), gn = AC.createGain();
      o.connect(gn); gn.connect(AC.destination);
      o.type = t; o.frequency.value = f;
      gn.gain.setValueAtTime(g, AC.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + d);
      o.start(); o.stop(AC.currentTime + d);
    } catch(e) {}
  }, dl * 1000);
}
function sndOK() { beep(523,.1); beep(659,.1,'sine',.3,.12); beep(784,.2,'sine',.3,.24); }
function sndBad() { beep(220,.3,'sawtooth',.2); }
function sndBuzz() { beep(800,.05); beep(1000,.05,'sine',.3,.07); beep(1200,.1,'sine',.3,.14); }
function sndWin() { [523,659,784,1047].forEach(function(f,i){ beep(f,.25,'sine',.3,i*.15); }); }
function sndTick() { beep(600,.05,'square',.08); }

// ══════════════════════════
// SPEECH
// ══════════════════════════
function speak(txt) {
  if (!window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'fr-FR'; u.rate = .95; u.pitch = 1.05; u.volume = .9;
    var vs = speechSynthesis.getVoices();
    var fv = vs.find(function(v){ return v.lang.startsWith('fr'); });
    if (fv) u.voice = fv;
    speechSynthesis.speak(u);
  } catch(e) {}
}

// ══════════════════════════
// STATE
// ══════════════════════════
var S = {
  p1: {name:'Joueur 1', color:'#007AFF', avatar:null},
  p2: {name:'Joueur 2', color:'#FF2D55', avatar:null},
  s1:0, s2:0, manche:1, totalM:3,
  gOrder:[], gIdx:0, giftLeft:3, buzzCnt:0,
  quizI:0, tmkI:0, logI:0, oscI:0, dlmI:0, vodI:0, btI:0,
  survScnIdx:0, survScIdx:0, survHp:100,
  escScnIdx:0, escEnIdx:0, escHp:3,
  tcI:0, bacLet:'', bacTmr:null, bacSecs:90,
  tmrInt:null, curGame:null, gageI:0, gageFinI:0,
  // per-game state (reset each game)
  buzzed:false, passeFn:null, curVodPlayer:1
};

var GORDER = ['quiz-musical','survival','blind-test','escape-room','timer-challenge','devinez-mot','baccalaureat','on-se-complete','verite-defi','logique-coop','tu-me-connais'];
var GMETA = {
  'quiz-musical':    {name:'Quiz Musical',     emoji:'🎵', type:'vs',   desc:'Buzzez le premier et répondez !'},
  'survival':        {name:'Survival',          emoji:'🏝️', type:'coop', desc:'Prenez les meilleures décisions pour survivre !'},
  'blind-test':      {name:'Blind Test Cinéma', emoji:'🎬', type:'vs',   desc:'Reconnaissez le film à partir de l\'indice !'},
  'escape-room':     {name:'Escape Room',       emoji:'🔐', type:'coop', desc:'Résolvez les énigmes ensemble pour vous échapper !'},
  'timer-challenge': {name:'Timer Challenge',   emoji:'⏱️', type:'vs',   desc:'Nommez le maximum de réponses en 30 secondes !'},
  'devinez-mot':     {name:'Devinez le Mot',    emoji:'🗣️', type:'coop', desc:'Faites deviner le mot sans le dire ni le mimer !'},
  'baccalaureat':    {name:'Baccalauréat',      emoji:'📝', type:'vs',   desc:'Remplissez toutes les cases avant la fin du temps !'},
  'on-se-complete':  {name:'On se Complète',    emoji:'✍️', type:'coop', desc:'Complétez la phrase ensemble !'},
  'verite-defi':     {name:'Vérité ou Défi',    emoji:'💭', type:'vs',   desc:'Vérité intime ou défi fun !'},
  'logique-coop':    {name:'Test de Logique',   emoji:'🧠', type:'coop', desc:'Résolvez les énigmes logiques ensemble !'},
  'tu-me-connais':   {name:'Tu me Connais ?',   emoji:'❓', type:'vs',   desc:'Qui connaît le mieux l\'autre ?'}
};
var GAGES = ['Faire un compliment sincère à l\'autre','Laisser l\'autre choisir ce qu\'on regarde','Faire 15 squats ou 10 pompes 💪','Raconter un souvenir gênant sans rien cacher','Garder une expression sérieuse pendant 1 minute','Danser 30 secondes sur une chanson choisie par l\'autre 💃','Bisou sur la partie du corps que t\'aimes le plus chez l\'autre 😏','Parler avec un accent étranger pendant 2 minutes','Mimique de célébrité que l\'autre doit deviner','Faire le robot ou une chorée ridicule 🤖','Répondre aux 3 prochaines questions en chantant 🎤','Imiter l\'autre pendant 3 minutes — voix, gestes, tout','Dire 5 vérités sur toi sans réfléchir'];
var WCOLS = ['#007AFF','#5856D6','#FF2D55','#FF9F0A','#34C759','#5AC8FA','#BF5AF2','#FF6B35','#30D158','#64D2FF','#FFD60A'];
var TOTAL_SECS = 90;
var CIRC = 125.6;

// ══════════════════════════
// SCREENS
// ══════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════
// HOME
// ══════════════════════════
function loadAv(p, inp) {
  var f = inp.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(e) {
    var img = document.getElementById('av'+p+'img');
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('av'+p+'ico').style.display = 'none';
    S['p'+p].avatar = e.target.result;
  };
  r.readAsDataURL(f);
}
function selC(p, c, el) {
  document.querySelectorAll('#cd'+p+' .cdot').forEach(function(d){ d.classList.remove('sel'); });
  el.classList.add('sel');
  S['p'+p].color = c;
}
function startGame() {
  if (AC) AC.resume();
  S.p1.name = document.getElementById('n1').value.trim() || 'Joueur 1';
  S.p2.name = document.getElementById('n2').value.trim() || 'Joueur 2';
  S.s1 = 0; S.s2 = 0; S.manche = 1; S.gIdx = 0;
  S.gOrder = GORDER.slice();
  S.giftLeft = 3; S.buzzCnt = 0;
  updTB(); showScreen('s-wheel'); drawWheel();
}

// ══════════════════════════
// TOPBAR
// ══════════════════════════
function avEl(p, sz) {
  sz = sz || 24;
  var pl = S['p'+p];
  if (pl.avatar) return '<img class="savimg" src="'+pl.avatar+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;object-fit:cover">';
  return '<div class="savp" style="background:'+pl.color+'22;color:'+pl.color+';width:'+sz+'px;height:'+sz+'px">'+pl.name[0]+'</div>';
}
function tbHTML(p) {
  return avEl(p) + '<span class="sname">' + S['p'+p].name + '</span><span class="spts">' + S['s'+p] + '</span>';
}
function updTB() {
  ['w-tb1','g-tb1','rec-tb1'].forEach(function(id){ var e=document.getElementById(id); if(e) e.innerHTML=tbHTML(1); });
  ['w-tb2','g-tb2','rec-tb2'].forEach(function(id){ var e=document.getElementById(id); if(e) e.innerHTML=tbHTML(2); });
  var m = 'MANCHE ' + S.manche;
  ['w-tbm','g-tbm','rec-tbm'].forEach(function(id){ var e=document.getElementById(id); if(e) e.textContent=m; });
}
function addPts(p, n) {
  S['s'+p] += n; updTB();
  var ids = p===1 ? ['w-tb1','g-tb1'] : ['w-tb2','g-tb2'];
  ids.forEach(function(id) {
    var e = document.getElementById(id);
    if (e) { e.style.borderColor = S['p'+p].color; setTimeout(function(){ e.style.borderColor=''; }, 600); }
  });
}
function penalize() {
  S.s1 = Math.max(0, S.s1-2);
  S.s2 = Math.max(0, S.s2-2);
  updTB();
}

// ══════════════════════════
// WHEEL
// ══════════════════════════
var wAngle = 0, wSpin = false, wCurGame = null;
function drawWheel(hi) {
  hi = hi !== undefined ? hi : -1;
  var cv = document.getElementById('wc'); if (!cv) return;
  var ctx = cv.getContext('2d');
  var cx=140, cy=140, r=136, n=S.gOrder.length;
  ctx.clearRect(0,0,280,280);
  S.gOrder.forEach(function(gid, i) {
    var sa = wAngle + (i/n)*Math.PI*2 - Math.PI/2;
    var ea = wAngle + ((i+1)/n)*Math.PI*2 - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
    ctx.fillStyle = (hi===i) ? '#FFD60A' : WCOLS[i%WCOLS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    var ma = (sa+ea)/2, tx = cx+Math.cos(ma)*r*.67, ty = cy+Math.sin(ma)*r*.67;
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(ma+Math.PI/2);
    ctx.font = '13px serif'; ctx.textAlign = 'center';
    ctx.fillText(GMETA[gid].emoji, 0, 0); ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1; ctx.stroke();
}
function spinWheel() {
  if (wSpin) return;
  if (S.gIdx >= S.gOrder.length) { showRecap(); return; }
  wSpin = true;
  document.getElementById('wspin').style.display = 'none';
  document.getElementById('wres').textContent = '';
  document.getElementById('wnxt').style.display = 'none';
  var tg = S.gOrder[S.gIdx], n = S.gOrder.length, ti = S.gIdx % n;
  var sliceA = (2*Math.PI)/n, ta = -(ti*sliceA);
  var spins = 4 + Math.random()*2, fa = ta + spins*Math.PI*2;
  var start = null, dur = 3200, startA = wAngle;
  function anim(ts) {
    if (!start) start = ts;
    var el = ts-start, prog = Math.min(el/dur,1), ease = 1-Math.pow(1-prog,4);
    wAngle = startA + (fa-startA)*ease;
    drawWheel();
    if (prog < 1) { requestAnimationFrame(anim); return; }
    wAngle = fa % (Math.PI*2); wCurGame = tg; drawWheel(ti); wSpin = false;
    var meta = GMETA[tg];
    document.getElementById('wres').textContent = meta.emoji + ' ' + meta.name;
    var gp = document.getElementById('wgprev');
    document.getElementById('wgpemoji').textContent = meta.emoji;
    document.getElementById('wgpname').textContent = meta.name;
    var tag = document.getElementById('wgptag');
    tag.textContent = meta.type==='vs' ? '⚔️ COMPÉTITIF' : '⚡ ÉQUIPE';
    tag.style.color = meta.type==='vs' ? '#FF2D55' : '#34C759';
    gp.style.display = 'flex';
    document.getElementById('wnxt').style.display = '';
    sndOK();
  }
  sndBuzz(); requestAnimationFrame(anim);
}
function launchGame() {
  if (!wCurGame) return;
  S.curGame = wCurGame;
  countdown(function() { showScreen('s-game'); renderGame(wCurGame); });
}

// ══════════════════════════
// COUNTDOWN
// ══════════════════════════
function countdown(cb) {
  showScreen('s-cd');
  var meta = GMETA[S.curGame];
  document.getElementById('cdgn').textContent = meta.emoji + ' ' + meta.name;
  var n = 3;
  var el = document.getElementById('cdnum');
  el.textContent = n;
  el.style.animation = 'none';
  speak(meta.name + '. ' + meta.desc);
  var iv = setInterval(function() {
    n--;
    if (n > 0) {
      el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'cdpop .5s cubic-bezier(.34,1.56,.64,1)';
      el.textContent = n;
    } else {
      clearInterval(iv);
      el.textContent = 'GO !'; sndWin();
      setTimeout(cb, 700);
    }
  }, 900);
}

// ══════════════════════════
// TIMER
// ══════════════════════════
function fmtT(s) { var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
function stopTmr() {
  if (S.tmrInt) { clearInterval(S.tmrInt); S.tmrInt = null; }
  if (S.bacTmr) { clearInterval(S.bacTmr); S.bacTmr = null; }
}
function startTmr(total, onEnd) {
  stopTmr();
  var secs = total;
  updTmrUI(secs, total);
  S.tmrInt = setInterval(function() {
    secs--; updTmrUI(secs, total); sndTick();
    if (secs <= 0) { stopTmr(); onEnd(); }
  }, 1000);
}
function updTmrUI(secs, total) {
  var arc = document.getElementById('gt-arc'), disp = document.getElementById('gt-disp');
  if (!arc || !disp) return;
  var pct = secs/total;
  arc.style.strokeDashoffset = CIRC*(1-pct);
  var col = secs>30 ? '#007AFF' : secs>15 ? '#FF9F0A' : '#FF3B30';
  arc.style.stroke = col;
  disp.textContent = fmtT(secs);
  disp.style.color = secs>30 ? '#fff' : col;
}
function timerHTML() {
  return '<div class="timerrow"><svg class="tsvg" width="48" height="48" viewBox="0 0 48 48"><circle class="tcbg" cx="24" cy="24" r="20"/><circle class="tcarc" id="gt-arc" cx="24" cy="24" r="20" stroke-dasharray="125.6" stroke-dashoffset="0" stroke="#007AFF"/></svg><div style="flex:1"><div class="ttime" id="gt-disp">1:30</div><div class="tlbl">TEMPS RESTANT</div></div><button class="btn-xs" id="gt-pass" onclick="doPasse()">⏭ Passer (-2)</button></div>';
}
function doPasse() {
  stopTmr();
  penalize();
  document.getElementById('gt-pass').disabled = true;
  if (S.passeFn) S.passeFn();
}

// ══════════════════════════
// GAME ENGINE
// ══════════════════════════
function endGame() {
  stopTmr();
  S.gIdx++;
  if (S.gIdx >= S.gOrder.length) {
    showRecap();
  } else {
    wCurGame = null;
    showScreen('s-wheel');
    document.getElementById('wspin').style.display = '';
    document.getElementById('wnxt').style.display = 'none';
    document.getElementById('wres').textContent = '';
    document.getElementById('wgprev').style.display = 'none';
    drawWheel(); updTB();
  }
}
function renderGame(id) {
  stopTmr();
  S.buzzed = false; S.passeFn = null;
  var m = GMETA[id];
  var tt = '<span class="gtag '+(m.type==='vs'?'tvs':'tcoop')+'">'+(m.type==='vs'?'⚔️ VS':'⚡ ÉQUIPE')+'</span>';
  var hdr = '<div class="ghpill fade-in"><span style="font-size:16px">'+m.emoji+'</span><h2>'+m.name+'</h2>'+tt+'</div>';
  var body = '';
  if      (id==='quiz-musical')    body = rQuiz();
  else if (id==='survival')        body = rSurvival();
  else if (id==='blind-test')      body = rBT();
  else if (id==='escape-room')     body = rEscape();
  else if (id==='timer-challenge') body = rTC();
  else if (id==='devinez-mot')     body = rDLM();
  else if (id==='baccalaureat')    body = rBac();
  else if (id==='on-se-complete')  body = rOSC();
  else if (id==='verite-defi')     body = rVOD();
  else if (id==='logique-coop')    body = rLogic();
  else if (id==='tu-me-connais')   body = rTMK();
  document.getElementById('ginner').innerHTML = hdr + '<div class="slide-up" style="display:flex;flex-direction:column;gap:10px">' + body + '</div>';
  updTB();
}
function buzzCards() {
  var p1 = S.p1, p2 = S.p2;
  var av1 = p1.avatar ? '<img class="bavimg" src="'+p1.avatar+'">' : '<div class="bavp" style="background:'+p1.color+'22;color:'+p1.color+'">'+p1.name[0]+'</div>';
  var av2 = p2.avatar ? '<img class="bavimg" src="'+p2.avatar+'">' : '<div class="bavp" style="background:'+p2.color+'22;color:'+p2.color+'">'+p2.name[0]+'</div>';
  return '<div class="bgrid"><div class="bcard bc1" id="bz1" onclick="doBuzz(1)">'+av1+'<div class="bname">'+p1.name+'</div><div class="blbl">BUZZ !</div></div><div class="bcard bc2" id="bz2" onclick="doBuzz(2)">'+av2+'<div class="bname">'+p2.name+'</div><div class="blbl">BUZZ !</div></div></div>';
}
function doBuzz(p) {
  if (S.buzzed) return;
  S.buzzed = true; stopTmr(); sndBuzz(); S.buzzCnt++;
  document.getElementById('bz'+p).classList.add('win');
  document.getElementById('bz'+(p===1?2:1)).classList.add('off');
  document.querySelectorAll('.bcard').forEach(function(b){ b.style.pointerEvents='none'; });
  var rb = document.getElementById('revbox'); if (rb) rb.classList.add('show');
  var pt = document.getElementById('ptrow'); if (pt) pt.style.display = 'flex';
  var pp = document.getElementById('gt-pass'); if (pp) pp.disabled = true;
}
function ptBtns() {
  var p1=S.p1, p2=S.p2;
  var gift = S.giftLeft>0 ? '<button class="btn btn-sm" style="background:rgba(255,214,10,.12);color:#FFD60A;border:1px solid rgba(255,214,10,.3)" id="gftbtn" onclick="doGift()">🎁 Offrir ('+S.giftLeft+')</button>' : '';

function doGift() {
  if (S.giftLeft<=0) return;

  var pt=document.getElementById('ptrow'); if(pt) pt.style.display='none';
  showNxt();
}
function showNxt() {

function survPick(idx) {
  var s = SURVIVAL[S.survScnIdx % SURVIVAL.length].scenes[S.survScIdx];

  S.survHp = Math.max(0, Math.min(100, S.survHp + s.hp[idx]));

function logPick(idx) {
  var q = LOGIC_ALL[S.logI % LOGIC_ALL.length];
  stopTmr();
  document.querySelectorAll('.opt').forEach(function(b,i) {
    b.disabled = true;
    if (i===idx) b.classList.add(idx===q.cor?'correct':'wrong');
    else if (i===q.cor && idx!==q.cor) b.classList.add('correct');
    else b.classList.add('disabled');
  });
  var fb = document.getElementById('logfb');
  if (idx === q.cor) {
    fb.className = 'fbbox fbok show'; fb.innerHTML = '✅ <strong>Correct !</strong> '+q.exp+' <strong style="color:#34C759">+'+q.pts+' pts chacun !</strong>';
    addPts(1,q.pts); addPts(2,q.pts); sndOK();
  } else {
    fb.className = 'fbbox fbko show'; fb.innerHTML = '❌ '+q.exp; penalize(); sndBad();
  }
  document.getElementById('gt-pass').disabled = true; showNxt();
}

// ══════════════════════════

// ══════════════════════════
var gageList = GAGES.slice().sort(function(){ return Math.random()-.5; });
function showRecap() {
  stopTmr();
  var s1=S.s1, s2=S.s2, winner=s1>s2?1:s2>s1?2:0;
  document.getElementById('rec-title').textContent = 'Fin de la Manche '+S.manche+' !';
  function mkCard(p, sc, isW) {
    var pl = S['p'+p];
    var av = pl.avatar ? '<img src="'+pl.avatar+'" style="width:52px;height:52px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block">' : '<div style="background:'+pl.color+'22;color:'+pl.color+';width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin:0 auto 8px">'+pl.name[0]+'</div>';
    return '<div style="flex:1;text-align:center;background:rgba(255,255,255,.05);border:1px solid '+(isW?'rgba(255,214,10,.4)':'rgba(255,255,255,.09)')+';border-radius:18px;padding:16px">'+(isW?'<div style="font-size:18px;margin-bottom:3px">👑</div>':'')+av+'<div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:4px">'+pl.name+'</div><div style="font-size:38px;font-weight:800;color:#FFD60A">'+sc+'</div></div>';
  }
  document.getElementById('rec-scores').innerHTML = mkCard(1,s1,s1>s2) + mkCard(2,s2,s2>s1);
  var dots=document.getElementById('rec-dots');
  dots.innerHTML = [0,1,2].map(function(i){ return '<div style="flex:1;height:4px;border-radius:2px;background:'+(i<S.manche-1?'#FFD60A':i===S.manche-1?'#fff':'rgba(255,255,255,.12)')+'"></div>'; }).join('');
  if (winner===0) {
    document.getElementById('rec-eq').style.display='block';
    document.getElementById('rec-gage').style.display='none';
  } else {
    document.getElementById('rec-eq').style.display='none';
    document.getElementById('rec-gage').style.display='block';
    var loser=winner===1?S.p2:S.p1;
    document.getElementById('rec-gage-who').textContent='GAGE POUR '+loser.name.toUpperCase();
    document.getElementById('rec-gage-txt').textContent = gageList[S.gageI % gageList.length];
  }
  var isLast=S.manche>=S.totalM;
  var btn=document.getElementById('rec-nxt');
  btn.textContent=isLast?'Voir le résultat final 🏆':'Manche suivante →';
  btn.className='btn w100 '+(isLast?'btn-gold':'btn-p');
  btn.style.maxWidth='400px';
  btn.onclick=isLast?showFin:nextManche;
  if (s1>s2) sndWin(); else if (s2>s1) sndBad(); else sndOK();
  updTB(); showScreen('s-recap');
}
function newGage() { S.gageI++; document.getElementById('rec-gage-txt').textContent=gageList[S.gageI%gageList.length]; }
function nextManche() {
  S.manche++; S.gIdx=0; S.giftLeft=3;
  updTB(); showScreen('s-wheel');
  document.getElementById('wspin').style.display='';
  document.getElementById('wnxt').style.display='none';
  document.getElementById('wres').textContent='';
  document.getElementById('wgprev').style.display='none';
  drawWheel();
}

var gageFinList = GAGES.slice().sort(function(){ return Math.random()-.5; });
function showFin() {
  var s1=S.s1,s2=S.s2,winner=s1>=s2?1:2;
  var win=S['p'+winner], los=S['p'+(winner===1?2:1)];
  var ws=S['s'+winner], ls=S['s'+(winner===1?2:1)];
  document.getElementById('fin-winner').textContent = s1===s2 ? 'Égalité parfaite ! 🤝' : win.name+' gagne ! 🎉';
  document.getElementById('fin-sub').textContent = s1===s2 ? s1+' points chacun' : ws+' — '+ls+' points';
  function mkC(p,sc,isW) {
    var pl=S['p'+p];
    var av=pl.avatar?'<img src="'+pl.avatar+'" style="width:52px;height:52px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block">':'<div style="background:'+pl.color+'22;color:'+pl.color+';width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin:0 auto 8px">'+pl.name[0]+'</div>';
    return '<div style="flex:1;text-align:center;background:rgba(255,255,255,.05);border:1px solid '+(isW?'rgba(255,214,10,.4)':'rgba(255,255,255,.09)')+';border-radius:18px;padding:16px">'+(isW?'<div style="font-size:20px;margin-bottom:3px">👑</div>':'')+av+'<div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:4px">'+pl.name+'</div><div style="font-size:38px;font-weight:800;color:#FFD60A">'+sc+'</div></div>';
  }
  document.getElementById('fin-scores').innerHTML = mkC(1,s1,s1>=s2) + mkC(2,s2,s2>=s1);
  if (s1 !== s2) {
    document.getElementById('fin-prize').style.display='block';
    document.getElementById('fin-prize-txt').textContent = win.name+' peut demander ce qu\'il/elle veut à '+los.name+' 👑';
    document.getElementById('fin-gage').style.display='block';
    document.getElementById('fin-gage-who').textContent='GAGE FINAL POUR '+los.name.toUpperCase();
    document.getElementById('fin-gage-txt').textContent=gageFinList[S.gageFinI%gageFinList.length];
  }
  document.getElementById('fin-stats').innerHTML =
    '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:800;color:#007AFF">'+S.manche+'</div><div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:1px">MANCHES</div></div>' +
    '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:800;color:#007AFF">'+GORDER.length*S.totalM+'</div><div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:1px">JEUX</div></div>' +
    '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:800;color:#007AFF">'+S.buzzCnt+'</div><div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:1px">BUZZES</div></div>';
  sndWin(); showScreen('s-fin'); launchConfetti();
}
function newGageFin() { S.gageFinI++; document.getElementById('fin-gage-txt').textContent=gageFinList[S.gageFinI%gageFinList.length]; }
function restartGame() {
  stopTmr();
  S.s1=0;S.s2=0;S.manche=1;S.gIdx=0;S.giftLeft=3;S.buzzCnt=0;
  S.quizI=0;S.tmkI=0;S.logI=0;S.oscI=0;S.dlmI=0;S.vodI=0;S.btI=0;
  S.survScnIdx=0;S.survScIdx=0;S.survHp=100;
  S.escScnIdx=0;S.escEnIdx=0;S.escHp=3;
  S.tcI=0;S.gageI=0;S.gageFinI=0;S.buzzed=false;
  showScreen('s-home');
}
function shareScore() {
  var txt='🎮 Hadjikouvi Game — '+S.p1.name+' '+S.s1+'pts vs '+S.p2.name+' '+S.s2+'pts !';
  if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){ alert('Score copié ! 📋'); }); }
  else { alert(txt); }
}

// ══════════════════════════
// CONFETTI
// ══════════════════════════
function launchConfetti() {
  var cv=document.getElementById('confcv');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  var ctx=cv.getContext('2d');
  var cols=['#FFD60A','#007AFF','#FF2D55','#34C759','#5AC8FA','#FF9F0A','#BF5AF2'];
  var ps=[];
  for(var i=0;i<120;i++) ps.push({x:Math.random()*cv.width,y:Math.random()*-cv.height*.5,w:5+Math.random()*9,h:4+Math.random()*6,c:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*3,vy:1.5+Math.random()*3,rot:Math.random()*360,vr:(Math.random()-.5)*5,op:1});
  var el=0,fr;
  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height); el++;
    ps.forEach(function(p) {
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      if(el>180) p.op=Math.max(0,p.op-.008);
      ctx.save();ctx.globalAlpha=p.op;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;p.op=1;}
    });
    if(el<300) fr=requestAnimationFrame(draw); else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}
